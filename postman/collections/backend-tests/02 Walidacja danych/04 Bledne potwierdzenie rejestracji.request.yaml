$kind: http-request
name: Błędne potwierdzenie rejestracji jest odrzucane
url: "{{base_url}}/auth/register-confirm"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "nie-email",
      "code": "12"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 400", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Odpowiedź zawiera błąd", function () {
        pm.expect(pm.response.json().error).to.be.a("string").and.not.empty;
      });
    language: text/javascript
order: 4000

