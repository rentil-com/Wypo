$kind: http-request
name: Lista wypożyczeń ma poprawny kontrakt paginacji
url: "{{base_url}}/wypozyczenia/wnioski?strona=1"
method: GET
queryParams:
  strona: "1"
headers:
  Authorization: "Bearer {{api_key}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Odpowiedź zawiera paginację wypożyczeń", function () {
        const body = pm.response.json();
        pm.expect(body.strona).to.eql(1);
        pm.expect(body.limitWnioskowNaStrone).to.be.a("number");
        pm.expect(body.filtry).to.be.an("object");
        pm.expect(body.total).to.be.a("number");
        pm.expect(body.liczbaStron).to.be.a("number");
        pm.expect(body.dane).to.be.an("array");
      });
    language: text/javascript
order: 5000

