$kind: http-request
name: Lista usuwalnych kategorii jest tablicą ID
url: "{{base_url}}/kategorie/usun"
method: GET
headers:
  Authorization: "Bearer {{api_key}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Odpowiedź zawiera tylko dodatnie ID", function () {
        const body = pm.response.json();
        pm.expect(body).to.be.an("array");
        body.forEach(function (id) {
          pm.expect(Number(id)).to.be.above(0);
        });
      });
    language: text/javascript
order: 3000

