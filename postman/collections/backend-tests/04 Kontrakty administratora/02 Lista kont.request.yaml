$kind: http-request
name: Lista kont ma poprawny kontrakt paginacji
url: "{{base_url}}/account/details/all?strona=1"
method: GET
queryParams:
  strona: "1"
headers:
  Authorization: "Bearer {{api_key}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Odpowiedź zawiera paginację kont", function () {
        const body = pm.response.json();
        pm.expect(body.strona).to.eql(1);
        pm.expect(body.limitKontNaStrone).to.be.a("number");
        pm.expect(body.filtry).to.be.an("object");
        pm.expect(body.total).to.be.a("number");
        pm.expect(body.liczbaStron).to.be.a("number");
        pm.expect(body.dane).to.be.an("array");
      });

      pm.test("Lista nie ujawnia hashy haseł", function () {
        pm.response.json().dane.forEach(function (account) {
          pm.expect(account).not.to.have.property("haslo_hash");
        });
      });
    language: text/javascript
order: 2000

