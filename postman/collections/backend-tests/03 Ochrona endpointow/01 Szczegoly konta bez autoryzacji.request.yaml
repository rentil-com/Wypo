$kind: http-request
name: Szczegóły konta odrzucają niepoprawny Bearer
url: "{{base_url}}/account/details"
method: GET
headers:
  Authorization: Bearer invalid_test_token
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 401", function () {
        pm.response.to.have.status(401);
      });

      pm.test("Komunikat wymaga logowania", function () {
        pm.expect(pm.response.json().error).to.include("Wymagane logowanie");
      });
    language: text/javascript
order: 1000

