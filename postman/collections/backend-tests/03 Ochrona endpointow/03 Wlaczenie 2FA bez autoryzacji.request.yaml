$kind: http-request
name: Włączenie 2FA wymaga logowania
url: "{{base_url}}/auth/2fa/enable"
method: POST
headers:
  Authorization: Bearer invalid_test_token
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 401", function () {
        pm.response.to.have.status(401);
      });
    language: text/javascript
order: 3000

