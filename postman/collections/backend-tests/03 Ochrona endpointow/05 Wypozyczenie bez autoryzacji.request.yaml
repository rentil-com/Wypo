$kind: http-request
name: Złożenie wniosku wymaga logowania
url: "{{base_url}}/wypozyczenia/wypozycz"
method: POST
headers:
  Authorization: Bearer invalid_test_token
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 401", function () {
        pm.response.to.have.status(401);
      });
    language: text/javascript
order: 5000

