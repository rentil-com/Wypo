$kind: http-request
name: Ustawienia workera wymagaja logowania
url: "{{base_url}}/worker/settings"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 401", function () {
        pm.response.to.have.status(401);
      });

      pm.test("Odpowiedz wymaga logowania", function () {
        pm.expect(pm.response.json().error).to.include("Wymagane logowanie");
      });
    language: text/javascript
order: 11000

