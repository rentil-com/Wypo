$kind: http-request
name: Lista wszystkich recenzji wymaga administratora
url: "{{base_url}}/recenzje"
method: GET
headers:
  Authorization: Bearer invalid_test_token
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 401", function () {
        pm.response.to.have.status(401);
      });
    language: text/javascript
order: 8000

