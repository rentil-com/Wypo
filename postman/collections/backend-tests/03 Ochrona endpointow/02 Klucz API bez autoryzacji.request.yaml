$kind: http-request
name: Status klucza API odrzuca niepoprawny Bearer
url: "{{base_url}}/auth/api-key"
method: GET
headers:
  Authorization: Bearer invalid_test_token
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 401", function () {
        pm.response.to.have.status(401);
      });
    language: text/javascript
order: 2000

