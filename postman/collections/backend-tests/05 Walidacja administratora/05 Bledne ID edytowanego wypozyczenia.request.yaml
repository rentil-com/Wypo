$kind: http-request
name: Edycja wypożyczenia z błędnym ID jest odrzucana
url: "{{base_url}}/wypozyczenia/edytuj/abc"
method: PATCH
headers:
  Authorization: "Bearer {{api_key}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 400", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Odpowiedź zawiera błąd", function () {
        pm.expect(pm.response.json().error).to.be.a("string").and.not.empty;
      });
    language: text/javascript
order: 5000

