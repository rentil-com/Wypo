$kind: http-request
name: Lista sprzętu ma poprawny kontrakt paginacji
url: "{{base_url}}/items?strona=1"
method: GET
headers:
  Authorization: Bearer invalid_test_token
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Odpowiedź zawiera paginację i dane", function () {
        const body = pm.response.json();
        pm.expect(body.strona).to.eql(1);
        pm.expect(body.limitPrzedmiotowNaStrone).to.be.a("number");
        pm.expect(body.total).to.be.a("number");
        pm.expect(body.liczbaStron).to.be.a("number");
        pm.expect(body.dane).to.be.an("array");
        pm.expect(body.czyAdmin).to.eql(false);
      });

      pm.test("Lista nie ujawnia specyfikacji", function () {
        const body = pm.response.json();
        body.dane.forEach(function (item) {
          pm.expect(item).not.to.have.property("specyfikacje");
        });
      });
    language: text/javascript
order: 4000

