$kind: http-request
name: Niepoprawne ID kategorii jest odrzucane
url: "{{base_url}}/kategorie/abc"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 400", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Odpowiedź zawiera błąd", function () {
        const body = pm.response.json();
        pm.expect(body.error).to.be.a("string").and.not.empty;
      });
    language: text/javascript
order: 3000

