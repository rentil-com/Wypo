$kind: http-request
name: Wyszukiwanie bez frazy zwraca pustą tablicę
url: "{{base_url}}/items/search"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Odpowiedź jest pustą tablicą", function () {
        pm.expect(pm.response.json()).to.eql([]);
      });
    language: text/javascript
order: 5000

