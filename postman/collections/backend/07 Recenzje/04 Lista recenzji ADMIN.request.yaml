$kind: http-request
name: Lista recenzji (admin)
url: "{{base_url}}/recenzje?strona={{page}}&uzytkownik_id={{account_id}}&sprzet_id={{item_id}}&status=aktywna&gwiazdki=5"
method: GET
queryParams:
  strona: "{{page}}"
  uzytkownik_id: "{{account_id}}"
  sprzet_id: "{{item_id}}"
  status: "aktywna"
  gwiazdki: "5"
headers:
  - key: Authorization
    value: "Bearer {{api_key}}"
    disabled: true
order: 4000

