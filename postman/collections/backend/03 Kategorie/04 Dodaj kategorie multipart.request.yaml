$kind: http-request
name: Dodaj kategorię (multipart)
url: "{{base_url}}/kategorie/dodaj"
method: POST
headers:
  - key: Authorization
    value: "Bearer {{api_key}}"
    disabled: true
body:
  type: formdata
  content:
    - type: text
      key: nazwa
      value: Elektronarzędzia
    - key: zdjecie
      type: file
      src: "{{image_path}}"
    - type: text
      key: zdjecie_url
      value: https://example.com/kategoria.jpg
order: 4000

