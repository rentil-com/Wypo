$kind: http-request
name: Dodaj sprzęt (multipart)
url: "{{base_url}}/items/dodaj"
method: POST
headers:
  - key: Authorization
    value: "Bearer {{api_key}}"
    enabled: false
body:
  type: formdata
  content:
    - key: nazwa
      value: Wiertarka
    - key: opis
      value: Wiertarka udarowa
    - key: kategoria_id
      value: "{{category_id}}"
    - key: cena
      value: "49.99"
    - key: cena_po_promocji
      value: "39.99"
    - key: status
      value: dostepny
    - key: zdjecia_url
      value: '{"1":"https://example.com/wiertarka.jpg"}'
    - key: specyfikacje
      value: '[{"nazwa_specyfikacji":"Moc","opis_specyfikacji":"900 W","emotka_specyfikacji":"bolt.fill"}]'
    - key: zdjecia
      type: file
      src: "{{image_path}}"
    - key: zdjecie
      type: file
      src: "{{image_path}}"
order: 5000

