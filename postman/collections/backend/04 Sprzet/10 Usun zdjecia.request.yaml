$kind: http-request
name: Usuń zdjęcia sprzętu
url: "{{base_url}}/items/delete_photos/{{item_id}}"
method: DELETE
headers:
  - key: Content-Type
    value: application/json
    enabled: true
  - key: Authorization
    value: "Bearer {{api_key}}"
    enabled: false
body:
  type: json
  content: |-
    {
      "zdjecia": [1, 2]
    }
order: 10000

