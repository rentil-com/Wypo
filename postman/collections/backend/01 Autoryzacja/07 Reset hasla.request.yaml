$kind: http-request
name: Rozpocznij reset hasła
url: "{{base_url}}/auth/password-reset"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "{{user_email}}"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 202) {
        const body = pm.response.json();
        if (body.challenge) {
          pm.environment.set("reset_challenge", body.challenge);
        }
      }
    language: text/javascript
order: 7000

