$kind: http-request
name: Unieważnij klucz API
url: "{{base_url}}/auth/api-key"
method: DELETE
headers:
  - key: Authorization
    value: "Bearer {{api_key}}"
    disabled: true
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code >= 200 && pm.response.code < 300) {
        pm.environment.unset("api_key");
      }
    language: text/javascript
order: 11000

