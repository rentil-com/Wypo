$kind: http-request
name: Potwierdź reset hasła
url: "{{base_url}}/auth/password-reset/confirm"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "challenge": "{{reset_challenge}}",
      "code": "{{verification_code}}",
      "password": "{{new_user_password}}"
    }
order: 8000

