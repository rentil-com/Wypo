$kind: http-request
name: Decyzja wniosku (PATCH, admin)
url: "{{base_url}}/wypozyczenia/wnioski/{{rental_id}}"
method: PATCH
headers:
  - key: Content-Type
    value: application/json
    enabled: true
  - key: Authorization
    value: "Bearer {{api_key}}"
    enabled: false
body:
  type: json
  content: |-
    {
      "decyzja": "zaakceptowany"
    }
order: 4000

