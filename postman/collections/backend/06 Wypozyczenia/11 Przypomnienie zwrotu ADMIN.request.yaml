$kind: http-request
name: Wyślij przypomnienie o zwrocie (admin)
url: "{{base_url}}/wypozyczenia/przypomnienie-zwrotu/{{rental_id}}"
method: POST
headers:
  - key: Content-Type
    value: application/json
    enabled: true
  - key: Authorization
    value: "Bearer {{api_key}}"
    enabled: false
body:
  type: json
  content: |-
    {
      "miejsce_zwrotu": "Punkt wypożyczalni, ul. Przykładowa 1"
    }
order: 11000

